<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f39200" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="구독관리" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>구독 결제 관리</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Subscription Ledger</p>
          <h1>구독 결제 관리</h1>
        </div>
      </header>

      <section class="summary-grid" aria-label="요약">
        <article class="metric">
          <span>월 지출</span>
          <strong id="monthlyTotal">0원</strong>
        </article>
        <article class="metric">
          <span>연 지출</span>
          <strong id="yearlyTotal">0원</strong>
        </article>
        <article class="metric">
          <span>7일 내 결제</span>
          <strong id="dueSoonCount">0건</strong>
        </article>
        <article class="metric">
          <span>활성 구독</span>
          <strong id="activeCount">0개</strong>
        </article>
      </section>

      <details class="due-panel fold-panel timeline" id="upcomingPanel">
        <summary class="fold-summary due-summary">
          <span>
            <strong id="timelineTitle">다가오는 결제</strong>
            <small>30일 안에 결제될 활성 구독</small>
          </span>
          <span class="fold-meta">
            <b id="upcomingCount">0건</b>
            <small id="timelineRange">30일</small>
          </span>
        </summary>
        <ol id="upcomingList"></ol>
      </details>

      <main class="workspace">
        <details class="content-panel list-panel fold-panel" id="listPanel" open>
          <summary class="fold-summary list-summary">
            <span>
              <strong>구독 목록</strong>
              <small>결제일 가까운 순</small>
            </span>
            <div class="content-actions">
              <button class="primary-button compact add-button" type="button" id="openForm">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14M5 12h14" />
                </svg>
                구독 추가
              </button>
            </div>
          </summary>

          <div class="list-body">
            <div class="subscription-list" id="subscriptionList"></div>

            <div class="empty-state" id="emptyState" hidden>
              <strong>등록된 구독이 없음</strong>
            </div>

            <details class="audit-panel" id="auditPanel">
              <summary class="fold-summary audit-summary">
                <span>
                  <strong id="auditTitle">숨은 구독 점검</strong>
                  <small>가끔 생각날 때만 열어보는 체크리스트</small>
                </span>
                <span class="audit-progress" id="auditProgress">0/0</span>
              </summary>
              <div class="audit-list" id="auditList"></div>
            </details>
          </div>
        </details>
      </main>
    </div>

    <dialog class="form-dialog" id="formDialog">
      <section class="entry-panel dialog-card" aria-labelledby="formTitle">
        <div class="panel-heading dialog-heading">
          <div>
            <p class="eyebrow">Entry</p>
            <h2 id="formTitle">구독 등록</h2>
          </div>
          <button class="icon-button mini" type="button" id="closeForm" title="닫기" aria-label="닫기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </button>
        </div>

        <form id="subscriptionForm" autocomplete="off">
          <input id="editingId" type="hidden" />

          <label>
            <span>서비스명</span>
            <input id="serviceName" name="serviceName" type="text" placeholder="ChatGPT" required />
          </label>

          <div class="form-row">
            <label>
              <span>금액</span>
              <input id="amount" name="amount" type="number" min="0" step="0.01" placeholder="22000" required />
            </label>
            <label>
              <span>통화</span>
              <select id="currency" name="currency">
                <option value="KRW">KRW</option>
                <option value="JPY">JPY</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
              </select>
            </label>
          </div>

          <div class="form-row">
            <label>
              <span>결제주기</span>
              <select id="cycle" name="cycle">
                <option value="monthly">매월</option>
                <option value="yearly">매년</option>
                <option value="quarterly">분기</option>
                <option value="weekly">매주</option>
              </select>
            </label>
            <label>
              <span>다음 결제일</span>
              <input id="nextDate" name="nextDate" type="date" required />
            </label>
          </div>

          <label>
            <span>카테고리</span>
            <input id="category" name="category" type="text" list="categoryOptions" placeholder="AI/업무" />
            <datalist id="categoryOptions">
              <option value="AI/업무"></option>
              <option value="영상/편집"></option>
              <option value="영상/음악"></option>
              <option value="디자인"></option>
              <option value="쇼핑"></option>
              <option value="서버/도메인"></option>
              <option value="생활"></option>
              <option value="기타"></option>
            </datalist>
          </label>

          <label>
            <span>결제수단</span>
            <select id="paymentMethod" name="paymentMethod">
              <option value="카드결제">카드결제</option>
              <option value="앱스토어">앱스토어</option>
              <option value="휴대폰">휴대폰</option>
            </select>
          </label>

          <label>
            <span>상태</span>
            <select id="status" name="status">
              <option value="active">활성</option>
              <option value="paused">보류</option>
            </select>
          </label>

          <label>
            <span>메모</span>
            <textarea id="notes" name="notes" rows="3" placeholder="계정, 용도, 해지 후보 등"></textarea>
          </label>

          <div class="form-actions">
            <button class="primary-button" type="submit" id="saveButton">저장</button>
            <button class="ghost-button" type="button" id="clearForm">닫기</button>
          </div>
        </form>
      </section>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
  </body>
</html>
