<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f39200" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="구독관리" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>구독 결제 관리</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Subscription Ledger</p>
          <h1>구독 결제 관리</h1>
        </div>
        <button class="icon-button" type="button" id="openSettings" title="설정" aria-label="설정">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
            <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.5 1.2V21a2 2 0 1 1-4 0v-.1A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.2-.5H3a2 2 0 1 1 0-4h-.1A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.6 1.7 1.7 0 0 0 .5-1.2V3a2 2 0 1 1 4 0v.1A1.7 1.7 0 0 0 15.4 4.6a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.3.38.7.6 1.2.6h.4a2 2 0 1 1 0 4h-.4a1.7 1.7 0 0 0-1.2.5 1.7 1.7 0 0 0-.6 1Z" />
          </svg>
        </button>
      </header>

      <section class="summary-grid" aria-label="요약">
        <article class="metric">
          <span>월 지출</span>
          <strong id="monthlyTotal">0원</strong>
        </article>
        <article class="metric">
          <span>연 지출</span>
          <strong id="yearlyTotal">0원</strong>
        </article>
        <article class="metric">
          <span>7일 내 결제</span>
          <strong id="dueSoonCount">0건</strong>
        </article>
        <article class="metric">
          <span>활성 구독</span>
          <strong id="activeCount">0개</strong>
        </article>
      </section>

      <details class="due-panel fold-panel timeline" id="upcomingPanel">
        <summary class="fold-summary due-summary">
          <span>
            <strong id="timelineTitle">다가오는 결제</strong>
            <small>7일 안에 결제될 활성 구독</small>
          </span>
          <span class="fold-meta">
            <b id="upcomingCount">0건</b>
            <small id="timelineRange">7일</small>
          </span>
        </summary>
        <ol id="upcomingList"></ol>
      </details>

      <main class="workspace">
        <details class="content-panel list-panel fold-panel" id="listPanel" open>
          <summary class="fold-summary list-summary">
            <span>
              <strong>구독 목록</strong>
              <small>결제일 가까운 순</small>
            </span>
            <div class="content-actions">
              <button class="primary-button compact add-button" type="button" id="openForm">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 5v14M5 12h14" />
                </svg>
                구독 추가
              </button>
            </div>
          </summary>

          <div class="list-body">
            <div class="subscription-list" id="subscriptionList"></div>

            <div class="empty-state" id="emptyState" hidden>
              <strong>등록된 구독이 없음</strong>
            </div>

            <details class="audit-panel" id="auditPanel">
              <summary class="fold-summary audit-summary">
                <span>
                  <strong id="auditTitle">숨은 구독 점검</strong>
                  <small>가끔 생각날 때만 열어보는 체크리스트</small>
                </span>
                <span class="audit-progress" id="auditProgress">0/0</span>
              </summary>
              <div class="audit-list" id="auditList"></div>
            </details>
          </div>
        </details>
      </main>
    </div>

    <dialog class="form-dialog" id="formDialog">
      <section class="entry-panel dialog-card" aria-labelledby="formTitle">
        <div class="panel-heading dialog-heading">
          <div>
            <p class="eyebrow">Entry</p>
            <h2 id="formTitle">구독 등록</h2>
          </div>
          <button class="icon-button mini" type="button" id="closeForm" title="닫기" aria-label="닫기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </button>
        </div>

        <form id="subscriptionForm" autocomplete="off">
          <input id="editingId" type="hidden" />

          <label>
            <span>서비스명</span>
            <select id="serviceName" name="serviceName" required></select>
          </label>

          <div class="form-row">
            <label>
              <span>금액</span>
              <input id="amount" name="amount" type="number" min="0" step="0.01" placeholder="22000" required />
            </label>
            <label>
              <span>통화</span>
              <select id="currency" name="currency">
                <option value="KRW">KRW</option>
                <option value="JPY">JPY</option>
                <option value="USD">USD</option>
                <option value="EUR">EUR</option>
              </select>
            </label>
          </div>

          <label>
            <span>실결제 원화금액</span>
            <input id="actualKrwAmount" name="actualKrwAmount" type="number" min="0" step="1" inputmode="numeric" placeholder="29320" />
          </label>

          <div class="form-row">
            <label>
              <span>결제주기</span>
              <select id="cycle" name="cycle">
                <option value="monthly">매월</option>
                <option value="yearly">매년</option>
                <option value="quarterly">분기</option>
                <option value="weekly">매주</option>
              </select>
            </label>
            <label>
              <span>다음 결제일</span>
              <input id="nextDate" name="nextDate" type="date" required />
            </label>
          </div>

          <label>
            <span>카테고리</span>
            <select id="category" name="category"></select>
          </label>

          <label>
            <span>결제수단</span>
            <select id="paymentMethod" name="paymentMethod"></select>
          </label>

          <label>
            <span>상태</span>
            <select id="status" name="status">
              <option value="active">활성</option>
              <option value="paused">보류</option>
              <option value="canceled">구독해지</option>
            </select>
          </label>

          <div class="form-actions">
            <button class="primary-button" type="submit" id="saveButton">저장</button>
            <button class="ghost-button" type="button" id="clearForm">닫기</button>
          </div>
        </form>
      </section>
    </dialog>

    <dialog class="form-dialog" id="settingsDialog">
      <section class="entry-panel dialog-card" aria-labelledby="settingsTitle">
        <div class="panel-heading dialog-heading">
          <div>
            <p class="eyebrow">Settings</p>
            <h2 id="settingsTitle">설정</h2>
          </div>
          <button class="icon-button mini" type="button" id="closeSettings" title="닫기" aria-label="닫기">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12" />
            </svg>
          </button>
        </div>

        <div class="settings-stack">
          <section class="settings-section">
            <h3>알림</h3>
            <label class="switch-row">
              <span>
                <strong>푸시알림</strong>
                <small id="notificationStatus">권한 확인 전</small>
              </span>
              <input id="notificationToggle" type="checkbox" />
            </label>
          </section>

          <section class="settings-section">
            <h3>테마</h3>
            <div class="segmented-control" role="group" aria-label="테마">
              <button type="button" data-theme-value="light">라이트</button>
              <button type="button" data-theme-value="dark">다크</button>
            </div>
          </section>

          <section class="settings-section">
            <h3>서비스명</h3>
            <form class="settings-add" id="serviceNameForm">
              <input id="serviceNameInput" type="text" placeholder="예: ChatGPT" />
              <button class="primary-button compact" type="submit">추가</button>
            </form>
            <div class="settings-list" id="serviceNameList"></div>
          </section>

          <section class="settings-section">
            <h3>결제수단</h3>
            <form class="settings-add" id="paymentMethodForm">
              <input id="paymentMethodInput" type="text" placeholder="예: 페이팔" />
              <button class="primary-button compact" type="submit">추가</button>
            </form>
            <div class="settings-list" id="paymentMethodList"></div>
          </section>

          <section class="settings-section">
            <h3>카테고리</h3>
            <form class="settings-add" id="categoryForm">
              <input id="categoryInput" type="text" placeholder="예: 일본업무" />
              <button class="primary-button compact" type="submit">추가</button>
            </form>
            <div class="settings-list" id="categoryList"></div>
          </section>
        </div>
      </section>
    </dialog>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="./app.js"></script>
  </body>
</html>
